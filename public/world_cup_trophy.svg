<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gold gradients for metallic trophy look -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE082" />
      <stop offset="30%" stop-color="#FFD54F" />
      <stop offset="70%" stop-color="#FFB300" />
      <stop offset="100%" stop-color="#FF8F00" />
    </linearGradient>
    <linearGradient id="gold-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4" />
      <stop offset="50%" stop-color="#FFE082" />
      <stop offset="100%" stop-color="#FFC107" />
    </linearGradient>
    <linearGradient id="gold-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E65100" />
      <stop offset="50%" stop-color="#FFB300" />
      <stop offset="100%" stop-color="#FF6F00" />
    </linearGradient>
    <!-- Malachite / Green bands for the base -->
    <linearGradient id="malachite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004D40" />
      <stop offset="50%" stop-color="#00BFA5" />
      <stop offset="100%" stop-color="#004D40" />
    </linearGradient>
  </defs>

  <!-- Circular background for great contrast and visibility as a tab icon (PWA/Favicon friendly) -->
  <circle cx="256" cy="256" r="240" fill="#0A0F1D" stroke="url(#gold)" stroke-width="8" />

  <g transform="translate(136, 60) scale(0.47)">
    <!-- Base Rings of Malachite & Gold -->
    <!-- Lower Base Block -->
    <path d="M 120 740 L 380 740 C 390 740, 400 748, 400 758 L 400 770 C 400 780, 390 788, 380 788 L 120 788 C 110 788, 100 780, 100 770 L 100 758 C 100 748, 110 740, 120 740 Z" fill="url(#gold-dark)" />
    
    <!-- Lower Malachite Band -->
    <path d="M 110 690 L 390 690 C 395 690, 400 698, 398 708 L 392 730 C 391 735, 386 740, 380 740 L 120 740 C 114 740, 109 735, 108 730 L 102 708 C 100 698, 105 690, 110 690 Z" fill="url(#malachite)" />
    
    <!-- Gold Spacer 1 -->
    <path d="M 115 675 L 385 675 C 390 675, 394 679, 394 683 L 392 690 H 108 L 106 683 C 106 679, 110 675, 115 675 Z" fill="url(#gold)" />
    
    <!-- Upper Malachite Band -->
    <path d="M 125 615 C 125 615, 250 635, 375 615 C 385 613, 392 622, 390 632 L 385 665 C 384 671, 379 675, 373 675 L 127 675 C 121 675, 116 671, 115 665 L 110 632 C 108 622, 115 615, 125 615 Z" fill="url(#malachite)" />
    
    <!-- Upper Base Gold Block -->
    <path d="M 140 550 C 140 550, 250 585, 360 550 C 370 547, 381 555, 380 565 L 375 605 C 375 611, 370 615, 364 615 C 290 625, 210 625, 136 615 C 130 615, 125 611, 125 605 L 120 565 C 119 555, 130 550, 140 550 Z" fill="url(#gold)" />

    <!-- Stem & Flutes (The dynamic human figures holding up the world) -->
    <!-- Body core structure -->
    <path d="M 152 550 C 158 530, 170 480, 150 420 C 130 360, 160 300, 180 270 C 200 240, 220 250, 225 280 C 230 310, 215 370, 230 420 C 240 450, 270 450, 280 420 C 295 370, 280 310, 285 280 C 290 250, 310 240, 330 270 C 350 300, 380 360, 360 420 C 340 480, 352 530, 358 550 Z" fill="url(#gold-highlight)" />

    <!-- Left Spiral Sweep (representing athlete movement/fluting) -->
    <path d="M 135 550 C 130 420, 185 300, 220 220 C 200 220, 180 240, 160 270 C 140 300, 110 370, 125 450 C 133 490, 144 525, 152 550 Z" fill="url(#gold-dark)" opacity="0.85" />

    <!-- Right Spiral Sweep -->
    <path d="M 375 550 C 380 420, 325 300, 290 220 C 310 220, 330 240, 350 270 C 370 300, 400 370, 385 450 C 377 490, 366 525, 358 550 Z" fill="url(#gold)" opacity="0.85" />
    
    <!-- Dynamic Ribbons / Sweeping Arms supporting the Earth -->
    <path d="M 160 270 C 140 220, 160 180, 200 160 C 220 185, 230 210, 225 280 C 215 250, 180 260, 160 270 Z" fill="url(#gold)" />
    <path d="M 350 270 C 370 220, 350 180, 312 160 C 292 185, 282 210, 287 280 C 297 250, 332 260, 350 270 Z" fill="url(#gold-highlight)" />

    <!-- Central Flame of Gold (center detail of cup stem structure) -->
    <path d="M 230 420 C 240 390, 250 320, 225 280 C 235 270, 250 260, 256 280 C 262 260, 277 270, 287 280 C 262 320, 272 390, 282 420 C 270 440, 242 440, 230 420 Z" fill="url(#gold-dark)" />

    <!-- The Globe -->
    <!-- Back sphere shape -->
    <circle cx="256" cy="150" r="110" fill="url(#gold)" />
    
    <!-- Continents / Textured Overlays (styled representation of high contrast landmasses & victory lines) -->
    <!-- South America / Americas representation on left -->
    <path d="M 155 120 C 160 100, 180 90, 195 90 C 205 90, 210 110, 205 130 C 200 150, 180 180, 210 210 C 200 220, 185 220, 175 200 C 165 180, 150 140, 155 120 Z" fill="url(#gold-highlight)" opacity="0.9" />
    
    <!-- Africa / Eurasia representation on right -->
    <path d="M 270 90 C 290 75, 340 75, 355 100 C 365 115, 345 150, 330 150 C 315 150, 310 170, 320 185 C 310 205, 290 220, 280 200 C 270 180, 285 160, 270 140 C 260 125, 260 100, 270 90 Z" fill="url(#gold-highlight)" opacity="0.95" />
    
    <!-- Iconic Spiral Ribbons wrapping the Globe -->
    <path d="M 148 160 C 180 120, 330 120, 364 160 C 320 130, 190 130, 148 160 Z" fill="url(#gold-highlight)" />
    <path d="M 170 210 C 205 170, 305 170, 342 210 C 300 185, 210 185, 170 210 Z" fill="url(#gold-highlight)" />
    <path d="M 152 110 C 185 70, 325 70, 358 110 C 320 85, 190 85, 152 110 Z" fill="url(#gold-highlight)" />

    <!-- Highlight Reflection on Globe top left -->
    <ellipse cx="210" cy="80" rx="35" ry="15" transform="rotate(-30, 210, 80)" fill="#FFF" opacity="0.3" />
  </g>
</svg>
