<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for advanced colors, textures and gradients -->
  <defs>
    <!-- Sphere deep base shadow/ambient color -->
    <radialGradient id="sphere-3d" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#E2E8F0" />
      <stop offset="90%" stop-color="#CBD5E1" />
      <stop offset="100%" stop-color="#94A3B8" />
    </radialGradient>

    <!-- Metallic Gold for Premium lines and Brand text -->
    <linearGradient id="premium-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" />
      <stop offset="50%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>

    <!-- Host Nations' Inspired Colors Gradient Loops (USA, Mexico, Canada) -->
    <!-- Patriotic Blue/Navy (USA) -->
    <linearGradient id="us-navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    
    <!-- Radiant Red (Canada / General passion) -->
    <linearGradient id="mex-can-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#B91C1C" />
    </linearGradient>

    <!-- Emerald / Aztec Green (Mexico / Lush fields) -->
    <linearGradient id="mex-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Inner Shadow for the main canvas backdrop of the favicon -->
    <radialGradient id="tab-bg" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#080C16" />
      <stop offset="100%" stop-color="#020408" />
    </radialGradient>
  </defs>

  <!-- Clean dark circular backdrop so the white ball stands out stunningly in BOTH light & dark browser tabs -->
  <circle cx="256" cy="256" r="240" fill="url(#tab-bg)" stroke="#1E293B" stroke-width="4" />

  <!-- Outer ambient glow of the soccer ball -->
  <circle cx="256" cy="256" r="185" fill="#000000" opacity="0.3" filter="blur(8px)" />

  <!-- Main Ball Sphere Base -->
  <circle cx="256" cy="256" r="180" fill="url(#sphere-3d)" stroke="#0F172A" stroke-width="6" />

  <!-- Dynamic panel curves and texture overlays representing the Official 2026 Match Ball's modern panels -->
  <g>
    <!-- Center panel group -->
    <!-- Top-Right Panel Arch (US Navy Blue Wing) -->
    <path d="M 256 76 C 290 100, 310 135, 310 170 C 310 205, 290 230, 256 240 C 275 190, 275 120, 256 76 Z" fill="url(#us-navy)" stroke="#0F172A" stroke-width="3" />
    <path d="M 264 90 C 290 115, 300 140, 300 165 C 300 190, 290 210, 264 220" fill="none" stroke="#60A5FA" stroke-width="2.5" opacity="0.8" />

    <!-- Left Panel Arch (Mexico Green Wing) -->
    <path d="M 130 180 C 160 145, 205 130, 250 140 C 220 180, 160 190, 130 180 Z" fill="url(#mex-green)" stroke="#0F172A" stroke-width="3" />
    <path d="M 150 174 C 180 150, 215 140, 240 148" fill="none" stroke="#34D399" stroke-width="2.5" opacity="0.8" />

    <!-- Bottom-Center Panel Arch (Canada Red Wing) -->
    <path d="M 180 320 C 190 270, 230 250, 270 250 C 280 290, 220 340, 180 320 Z" fill="url(#mex-can-red)" stroke="#0F172A" stroke-width="3" />
    <path d="M 194 306 C 202 276, 232 260, 258 260" fill="none" stroke="#F87171" stroke-width="2.5" opacity="0.8" />

    <!-- 2026 Modern Triangles/Spearheads pattern (characteristic of official match balls) -->
    <!-- Spearhead 1: Top Left -->
    <path d="M 180 120 Q 200 90, 220 110 T 180 120" fill="url(#premium-gold)" />
    <!-- Spearhead 2: Middle Right -->
    <path d="M 340 220 Q 370 200, 350 240 T 340 220" fill="url(#premium-gold)" />
    <!-- Spearhead 3: Bottom Left -->
    <path d="M 160 260 Q 150 300, 190 280 T 160 260" fill="url(#premium-gold)" />
    
    <!-- Seamless Soccer Ball Seam Lines (Classic meets Modern Panel Seams) -->
    <!-- Top-left curved seam -->
    <path d="M 256 76 C 210 90, 160 120, 130 180" fill="none" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Mid-left curved seam -->
    <path d="M 130 180 C 120 230, 140 290, 180 320" fill="none" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Bottom curved seam -->
    <path d="M 180 320 C 220 360, 280 380, 330 360" fill="none" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Right curved seam -->
    <path d="M 330 360 C 370 320, 390 250, 360 180" fill="none" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Top-right curved seam -->
    <path d="M 360 180 C 340 130, 310 90, 256 76" fill="none" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />

    <!-- Center Hub Connecting Seam Lines (creating authentic 3D structure) -->
    <path d="M 256 240 C 210 230, 180 200, 130 180" fill="none" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
    <path d="M 256 240 C 280 280, 310 320, 330 360" fill="none" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
    <path d="M 270 250 C 320 240, 345 200, 360 180" fill="none" stroke="#475569" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Peripheral seams spanning to the borders -->
    <!-- Top left outer -->
    <path d="M 210 95 C 200 80, 190 78, 192 78" fill="none" stroke="#64748B" stroke-width="3" stroke-linecap="round" />
    <!-- Center top outer -->
    <path d="M 256 76 L 256 78" fill="none" stroke="#64748B" stroke-width="4" stroke-linecap="round" />
    <!-- Left outer -->
    <path d="M 130 180 C 100 180, 80 190, 78 192" fill="none" stroke="#64748B" stroke-width="3" stroke-linecap="round" />
    <!-- Bottom left outer -->
    <path d="M 180 320 C 160 350, 130 380, 118 390" fill="none" stroke="#64748B" stroke-width="3" stroke-linecap="round" />
    <!-- Bottom right outer -->
    <path d="M 330 360 C 350 390, 380 410, 396 418" fill="none" stroke="#64748B" stroke-width="3" stroke-linecap="round" />
    <!-- Right outer -->
    <path d="M 360 180 C 390 180, 420 170, 432 168" fill="none" stroke="#64748B" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Official Brand mark label 'USA · MEX · CAN 2026' stylized as part of ball vector -->
  <g transform="translate(0, 0)">
    <path id="text-curve" d="M 140 375 Q 256 425 372 375" fill="none" />
    <text font-family="'Inter', 'Arial Black', sans-serif" font-weight="800" font-size="19" fill="#0F172A" opacity="0.9" letter-spacing="1.5">
      <textPath href="#text-curve" startOffset="50%" text-anchor="middle">
        WORLD CUP 2026
      </textPath>
    </text>
  </g>

  <!-- Subtle 3D Spherical Highlighting on the entire ball (adds glossy sheen look) -->
  <path d="M 120 130 Q 200 76 340 120 Q 230 40 120 130" fill="#FFFFFF" opacity="0.32" />
  <circle cx="160" cy="140" r="24" fill="#FFFFFF" opacity="0.25" filter="blur(6px)" />
</svg>
